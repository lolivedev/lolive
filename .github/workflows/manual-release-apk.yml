name: Release APK (Manual)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Validate native artifacts
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f "app/src/main/cpp/CMakeLists.txt" ]]; then
            for abi in armeabi-v7a arm64-v8a x86 x86_64; do
              test -f "app/src/main/jniLibs/${abi}/liblolive_native.so" || {
                echo "Missing prebuilt native library: app/src/main/jniLibs/${abi}/liblolive_native.so"
                exit 1
              }
            done
          fi

      - name: Prepare signing config
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" ]] || { echo "Missing secret SIGNING_KEYSTORE_BASE64"; exit 1; }
          [[ -n "${{ secrets.SIGNING_STORE_PASSWORD }}" ]] || { echo "Missing secret SIGNING_STORE_PASSWORD"; exit 1; }
          [[ -n "${{ secrets.SIGNING_KEY_ALIAS }}" ]] || { echo "Missing secret SIGNING_KEY_ALIAS"; exit 1; }
          [[ -n "${{ secrets.SIGNING_KEY_PASSWORD }}" ]] || { echo "Missing secret SIGNING_KEY_PASSWORD"; exit 1; }

          echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | tr -d '\r\n' | base64 -d > "$RUNNER_TEMP/release.jks"
          echo "SIGNING_STORE_FILE=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
          echo "SIGNING_STORE_PASSWORD=${{ secrets.SIGNING_STORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "SIGNING_KEY_ALIAS=${{ secrets.SIGNING_KEY_ALIAS }}" >> "$GITHUB_ENV"
          echo "SIGNING_KEY_PASSWORD=${{ secrets.SIGNING_KEY_PASSWORD }}" >> "$GITHUB_ENV"

      - name: Bump app version
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          FILE="app/build.gradle.kts"

          CURRENT_CODE=$(grep -E '^[[:space:]]*versionCode[[:space:]]*=' "$FILE" | head -n1 | sed -E 's/.*=[[:space:]]*([0-9]+).*/\1/')
          CURRENT_NAME=$(grep -E '^[[:space:]]*versionName[[:space:]]*=' "$FILE" | head -n1 | sed -E 's/.*"([^"]+)".*/\1/')

          NEXT_CODE=$((CURRENT_CODE + 1))

          if [[ "$CURRENT_NAME" =~ ^[0-9]+$ ]]; then
            NEXT_NAME="$((10#CURRENT_NAME + 1))"
          elif [[ "$CURRENT_NAME" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            NEXT_NAME="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.$((10#${BASH_REMATCH[3]} + 1))"
          elif [[ "$CURRENT_NAME" =~ ^([0-9]+)\.([0-9]+)$ ]]; then
            NEXT_NAME="${BASH_REMATCH[1]}.$((10#${BASH_REMATCH[2]} + 1))"
          else
            NEXT_NAME="${CURRENT_NAME}.${NEXT_CODE}"
          fi

          sed -i -E "s/^([[:space:]]*versionCode[[:space:]]*=[[:space:]]*)[0-9]+/\1${NEXT_CODE}/" "$FILE"
          sed -i -E "s/^([[:space:]]*versionName[[:space:]]*=[[:space:]]*)\"[^\"]+\"/\1\"${NEXT_NAME}\"/" "$FILE"

          echo "version_code=${NEXT_CODE}" >> "$GITHUB_OUTPUT"
          echo "version_name=${NEXT_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEXT_NAME}-build.${NEXT_CODE}" >> "$GITHUB_OUTPUT"

      - name: Commit and push version bump
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git commit -m "ci: bump app version to ${{ steps.bump.outputs.version_name }} (${{ steps.bump.outputs.version_code }})"
          git push

      - name: Build release APKs (ABI split)
        run: ./gradlew :app:assembleRelease --build-cache --configuration-cache --parallel

      - name: Collect APKs
        id: apks
        shell: bash
        run: |
          set -euo pipefail
          find app/build/outputs/apk/release -type f -name "*.apk" | sort

          ARM64=$(find app/build/outputs/apk/release -type f \( -name "*arm64-v8a*release*.apk" -o -name "*arm64-v8a*.apk" \) | head -n1)
          ARMV7=$(find app/build/outputs/apk/release -type f \( -name "*armeabi-v7a*release*.apk" -o -name "*armeabi-v7a*.apk" \) | head -n1)
          X86=$(find app/build/outputs/apk/release -type f \( -name "*x86*release*.apk" -o -name "*x86*.apk" \) | grep -v "x86_64" | head -n1)
          X86_64=$(find app/build/outputs/apk/release -type f \( -name "*x86_64*release*.apk" -o -name "*x86_64*.apk" \) | head -n1)
          UNIVERSAL=$(find app/build/outputs/apk/release -type f \( -name "*universal*release*.apk" -o -name "*universal*.apk" \) | head -n1)

          [[ -n "$ARM64" ]] || { echo "Missing arm64-v8a apk"; exit 1; }
          [[ -n "$ARMV7" ]] || { echo "Missing armeabi-v7a apk"; exit 1; }
          [[ -n "$X86" ]] || { echo "Missing x86 apk"; exit 1; }
          [[ -n "$X86_64" ]] || { echo "Missing x86_64 apk"; exit 1; }
          [[ -n "$UNIVERSAL" ]] || { echo "Missing universal apk"; exit 1; }

          echo "arm64=$ARM64" >> "$GITHUB_OUTPUT"
          echo "armv7=$ARMV7" >> "$GITHUB_OUTPUT"
          echo "x86=$X86" >> "$GITHUB_OUTPUT"
          echo "x86_64=$X86_64" >> "$GITHUB_OUTPUT"
          echo "universal=$UNIVERSAL" >> "$GITHUB_OUTPUT"

      - name: Create Git tag
        shell: bash
        run: |
          set -euo pipefail
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Create GitHub release and upload APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: lolive ${{ steps.bump.outputs.version_name }}
          generate_release_notes: true
          files: |
            ${{ steps.apks.outputs.arm64 }}
            ${{ steps.apks.outputs.armv7 }}
            ${{ steps.apks.outputs.x86 }}
            ${{ steps.apks.outputs.x86_64 }}
            ${{ steps.apks.outputs.universal }}
